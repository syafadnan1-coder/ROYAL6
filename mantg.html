        // ============================================================
        //  إعدادات واتساب (غيّر الرقم إلى رقم الشركة)
        // ============================================================
        const WHATSAPP_NUMBER = '967782002220'; // ضع رقم الجوال مع رمز الدولة بدون +
        const WHATSAPP_URL = `https://wa.me/${WHATSAPP_NUMBER}?text=`;

        // ============================================================
        //  عرض المنتجات
        // ============================================================
        const grid = document.getElementById('catalogGrid');
        const countBadge = document.getElementById('productCount');

        function renderProducts(filter = 'all') {
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
            if (filtered.length === 0) {
                grid.innerHTML =
                    `<div style="grid-column:1/-1; text-align:center; padding:40px 0; color:#6a8098;">لا توجد منتجات في هذا التصنيف</div>`;
                countBadge.textContent = '0 منتجات';
                return;
            }
            countBadge.textContent = filtered.length + ' منتجات';

            grid.innerHTML = filtered.map(p => `
                <div class="product-card" data-id="${p.id}" data-category="${p.category}">
                    <div class="image-wrapper">
                        <img src="${p.img}" alt="${p.name}" loading="lazy">
                    </div>
                    <div class="card-body">
                        <div class="product-name">${p.name}</div>
                        <div class="product-desc">${p.desc}</div>
                        <button class="order-btn" 
                                data-name="${p.name}" 
                                data-specs="${p.specs}">
                            💬 طلب عبر واتساب
                        </button>
                    </div>
                </div>
            `).join('');

            // إضافة مستمع لكل زر طلب
            document.querySelectorAll('.order-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const name = this.getAttribute('data-name');
                    const specs = this.getAttribute('data-specs');
                    sendWhatsApp(name, specs);
                });
            });
        }

        // ============================================================
        //  إرسال رسالة واتساب
        // ============================================================
        function sendWhatsApp(productName, productSpecs) {
            const message = `مرحباً، أرغب في طلب المنتج التالي:\n\n` +
                `المنتج: ${productName}\n` +
                `المواصفات: ${productSpecs}\n\n` +
                `أرجو التواصل معي لتأكيد الطلب.`;
            const encoded = encodeURIComponent(message);
            const url = WHATSAPP_URL + encoded;
            window.open(url, '_blank');
        }

        // ============================================================
        //  القائمة الجانبية
        // ============================================================
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggle = document.getElementById('menuToggle');
        const closeSidebar = document.getElementById('closeSidebar');

        function openSidebar() {
            sidebar.classList.add('open');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebarFunc() {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        menuToggle.addEventListener('click', openSidebar);
        closeSidebar.addEventListener('click', closeSidebarFunc);
        overlay.addEventListener('click', closeSidebarFunc);

        // تصفية حسب التصنيف
        document.querySelectorAll('.sidebar ul li').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.sidebar ul li').forEach(li => li.classList.remove('active'));
                this.classList.add('active');
                const cat = this.getAttribute('data-cat');
                renderProducts(cat);
                closeSidebarFunc();
            });
        });
        

        // ============================================================
        //  بدء التشغيل
        // ============================================================
        renderProducts('all');

        // إغلاق القائمة عند الضغط على زر الرجوع في المتصفح
        window.addEventListener('popstate', function() {
            if (sidebar.classList.contains('open')) closeSidebarFunc();
        });

        console.log('✅ كتالوج رويال للبلاستيك - واتساب مباشر');
